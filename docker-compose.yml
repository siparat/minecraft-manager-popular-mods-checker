services:
    postgres:
        image: postgres:17-alpine
        container_name: popular-mods-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: main
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U user -d main']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    pgdata:
