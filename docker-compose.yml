services:
    postgres:
        image: postgres:17-alpine
        container_name: popular-mods-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: main
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U user -d main']
            interval: 5s
            timeout: 5s
            retries: 10

    flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
        container_name: popular-mods-flaresolverr
        restart: unless-stopped
        environment:
            LOG_LEVEL: info
            LANG: en_US
            TZ: UTC
        ports:
            - '8191:8191'

    app:
        build: .
        container_name: popular-mods-app
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            flaresolverr:
                condition: service_started
        environment:
            DATABASE_URL: postgres://user:password@postgres:5432/main
            FLARESOLVERR_URL: http://flaresolverr:8191/v1
        volumes:
            - ./.env:/app/.env
volumes:
    pgdata:
